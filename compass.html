<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Compass</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:    #060608;
      --white:    #f0ede8;
      --dim:      #888078;
      --accent:   #c8a96e;
      --panel-w:  272px;
      --header-h: 50px;
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Courier New', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      height: var(--header-h);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 18px;
      border-bottom: 1px solid #111118;
      z-index: 50;
    }

    #menu-btn {
      background: none;
      border: none;
      color: var(--dim);
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      padding: 4px 5px;
      transition: color 0.2s;
      flex-shrink: 0;
    }
    #menu-btn:hover, #menu-btn.open { color: var(--white); }

    .hdr-title {
      font-family: 'Georgia', serif;
      font-size: 16px;
      font-weight: 400;
      flex-shrink: 0;
    }
    .hdr-title em { font-style: italic; color: var(--accent); }

    #preset-bar {
      display: flex;
      gap: 5px;
      margin-left: auto;
    }

    #path-btn {
      background: none;
      border: 1px solid #2a2a36;
      color: var(--dim);
      font-family: 'Courier New', monospace;
      font-size: 9px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 5px 13px;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.18s;
      margin-left: 8px;
    }
    #path-btn:hover { border-color: #f0ede8; color: var(--white); }
    #path-btn.active { border-color: var(--white); color: var(--white); background: rgba(240,237,232,0.07); }

    /* ── Path slider panel ── */
    #path-panel {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      align-items: center;
      gap: 14px;
      background: #0d0d12;
      border: 1px solid #22222c;
      border-radius: 4px;
      padding: 10px 18px;
      z-index: 90;
      white-space: nowrap;
    }
    #path-panel.show { display: flex; }
    .pp-label { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--dim); }
    #path-slider { width: 90px; accent-color: var(--white); cursor: pointer; }
    #path-count { font-size: 10px; color: var(--white); min-width: 40px; letter-spacing: 0.05em; }
    #path-clear {
      background: none; border: none;
      color: #333342; font-family: 'Courier New', monospace;
      font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase;
      cursor: pointer; padding: 0; transition: color 0.15s;
    }
    #path-clear:hover { color: var(--dim); }

    .preset-btn {
      background: none;
      border: 1px solid #1e1e26;
      color: var(--dim);
      font-family: 'Courier New', monospace;
      font-size: 9px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 5px 11px;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.18s;
    }
    .preset-btn:hover { border-color: #3a3a48; color: var(--white); }
    .preset-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(200,169,110,0.06);
    }

    /* ── Main area ── */
    #main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Side panel ── */
    #side-panel {
      width: 0;
      flex-shrink: 0;
      background: #07070b;
      border-right: 1px solid #111118;
      overflow: hidden;
      transition: width 0.28s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
    }
    #side-panel.open { width: var(--panel-w); }

    .panel-inner { width: var(--panel-w); display: flex; flex-direction: column; height: 100%; }

    .panel-section {
      padding: 14px 16px;
      border-bottom: 1px solid #111118;
      flex-shrink: 0;
    }

    .panel-label {
      font-size: 8px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 10px;
    }

    /* Sort */
    #sort-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

    .sort-btn {
      background: none;
      border: 1px solid #1a1a22;
      color: var(--dim);
      font-family: 'Courier New', monospace;
      font-size: 8px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4px 9px;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.15s;
    }
    .sort-btn:hover { border-color: #2e2e3a; color: var(--white); }
    .sort-btn.active { border-color: rgba(200,169,110,0.5); color: var(--accent); }

    #dir-btn {
      background: none;
      border: none;
      color: var(--dim);
      font-family: 'Courier New', monospace;
      font-size: 9px;
      cursor: pointer;
      margin-left: auto;
      padding: 4px 0;
      transition: color 0.15s;
    }
    #dir-btn:hover { color: var(--white); }

    /* Style chips */
    #style-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .chip {
      background: none;
      border: 1px solid #1a1a22;
      color: var(--dim);
      font-family: 'Courier New', monospace;
      font-size: 8px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 7px;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .chip:hover { border-color: #2e2e3a; color: var(--white); }
    .chip.on { border-color: rgba(200,169,110,0.45); color: var(--accent); }

    /* Track list */
    #track-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }
    #track-list::-webkit-scrollbar { width: 2px; }
    #track-list::-webkit-scrollbar-thumb { background: #1e1e26; }

    .ti {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 7px 16px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .ti:hover { background: rgba(240,237,232,0.03); }
    .ti.anchor { background: rgba(200,169,110,0.07); }

    .ti-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

    .ti-body { flex: 1; min-width: 0; }
    .ti-title {
      font-family: 'Georgia', serif;
      font-style: italic;
      font-size: 10px;
      color: var(--white);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.35;
    }
    .ti-meta {
      font-size: 8px;
      letter-spacing: 0.08em;
      color: var(--dim);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .ti-year {
      font-size: 9px;
      color: #333342;
      flex-shrink: 0;
      letter-spacing: 0.05em;
    }

    /* ── Canvas ── */
    #canvas-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #compass { cursor: crosshair; display: block; }

    /* ── Tooltip ── */
    #tooltip {
      position: fixed;
      pointer-events: none;
      background: #0d0d12;
      border: 1px solid #22222c;
      border-radius: 4px;
      padding: 12px 14px;
      width: 194px;
      opacity: 0;
      transition: opacity 0.12s;
      z-index: 100;
    }
    #tooltip.show { opacity: 1; }
    .tt-cover { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; margin-bottom: 10px; border-radius: 2px; background: #111118; }
    .tt-artist { font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; }
    .tt-title { font-family: 'Georgia', serif; font-size: 13px; font-style: italic; color: var(--white); line-height: 1.4; margin-bottom: 8px; }
    .tt-meta { font-size: 10px; color: var(--dim); line-height: 1.9; }
    .gdot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }

    /* ── Hint bar ── */
    #hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--dim);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      white-space: nowrap;
    }
    #hint.show { opacity: 1; }

    /* ── Stats ── */
    #stats {
      position: fixed;
      bottom: 20px;
      right: 22px;
      font-size: 9px;
      letter-spacing: 0.1em;
      color: #2a2a36;
      text-align: right;
      line-height: 2;
    }

    /* ── Upload overlay ── */
    #upload-overlay {
      position: fixed;
      inset: 0;
      background: var(--black);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 200;
    }
    .ov-p { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--dim); }
    .ov-btn { display: inline-block; padding: 10px 28px; border: 1px solid rgba(200,169,110,0.35); color: var(--accent); font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; cursor: pointer; transition: border-color 0.2s; }
    .ov-btn:hover { border-color: var(--accent); }
    .ov-hint { font-size: 9px; letter-spacing: 0.1em; color: rgba(136,128,120,0.4); }
    #file-input { display: none; }
  </style>
</head>
<body>

<header>
  <button id="menu-btn">≡</button>
  <span class="hdr-title">Time <em>Compass</em></span>
  <div id="preset-bar">
    <button class="preset-btn" data-preset="synchronicity">Sync ±7</button>
    <button class="preset-btn" data-preset="space">Space</button>
    <button class="preset-btn" data-preset="year">Year</button>
    <button class="preset-btn" data-preset="style">Style</button>
  </div>
  <button id="path-btn">Path</button>
</header>

<div id="path-panel">
  <span class="pp-label">Stops</span>
  <input type="range" id="path-slider" min="1" max="5" value="1" />
  <span id="path-count">1 stop</span>
  <button id="path-clear">Clear</button>
</div>

<div id="main">
  <div id="side-panel">
    <div class="panel-inner">

      <div class="panel-section">
        <div class="panel-label">Sort</div>
        <div id="sort-row">
          <button class="sort-btn active" data-key="year">Year</button>
          <button class="sort-btn" data-key="style">Style</button>
          <button class="sort-btn" data-key="label">Label</button>
          <button class="sort-btn" data-key="title">Title</button>
          <button id="dir-btn">↑</button>
        </div>
      </div>

      <div class="panel-section">
        <div class="panel-label">Filter Style</div>
        <div id="style-chips"></div>
      </div>

      <div id="track-list"></div>
    </div>
  </div>

  <div id="canvas-wrap">
    <canvas id="compass"></canvas>
  </div>
</div>

<div id="hint"></div>
<div id="tooltip">
  <img class="tt-cover" src="" alt="" />
  <div class="tt-artist"></div>
  <div class="tt-title"></div>
  <div class="tt-meta"></div>
</div>
<div id="stats"></div>

<div id="upload-overlay">
  <p class="ov-p">No collection loaded</p>
  <label class="ov-btn" for="file-input">Load collection.json</label>
  <input type="file" id="file-input" accept=".json" />
  <p class="ov-hint">run: npm run fetch → data/collection.json</p>
</div>

<script>
// ── Style → hue ──────────────────────────────────────────────────────────────
const STYLE_HUE = {
  'Techno':             240,
  'Dub Techno':         250,
  'Deep Techno':        245,
  'Acid Techno':        232,
  'Minimal':            210,
  'House':              195,
  'Deep House':         185,
  'Tech House':         200,
  'Progressive House':  175,
  'Ambient':            165,
  'Drone':              155,
  'Experimental':       160,
  'Italo-Disco':        320,
  'Disco':              315,
  'Pop Rock':           350,
  'Rock':                 5,
  'Funk':                28,
  'Soul':                32,
  'Jazz':                42,
  'Hip Hop':            280,
  'Breaks':             205,
  'Drum n Bass':        192,
  'Industrial':           0,
  'EBM':                 10,
  'New Wave':           305,
  'Synth-pop':          290,
  'Electro':            220,
};

const SPACE_WORDS = [
  'orbital','galactic','nebula','lune','atlas','capsule','hyperion',
  'cosmos','stellar','cosmic','astro','lunar','solar','void','nova',
  'eclipse','zenith','meteor','pulsar','space',
];

function styleHue(styles) {
  if (!styles?.length) return 45;
  const s = styles[0];
  if (STYLE_HUE[s] !== undefined) return STYLE_HUE[s];
  for (const [k, h] of Object.entries(STYLE_HUE)) {
    if (s.toLowerCase().includes(k.toLowerCase())) return h;
  }
  return 45;
}

function rng(n) {
  const x = Math.sin(n * 127.1 + 311.7) * 43758.5453;
  return x - Math.floor(x);
}

// ── Style position spectrum (Y axis in sound space) ──────────────────────────
const STYLE_POS = {
  'Ambient': 0, 'Drone': 0.05, 'Experimental': 0.1,
  'Minimal': 0.2, 'Dub Techno': 0.25, 'Techno': 0.3,
  'Deep Techno': 0.32, 'Acid Techno': 0.35, 'Electro': 0.4,
  'Tech House': 0.42, 'House': 0.45, 'Deep House': 0.5,
  'Progressive House': 0.55, 'Breaks': 0.6, 'Drum n Bass': 0.65,
  'Disco': 0.7, 'Italo-Disco': 0.72, 'Funk': 0.78,
  'Soul': 0.8, 'Hip Hop': 0.82, 'Jazz': 0.86,
  'New Wave': 0.88, 'Rock': 0.9, 'Pop Rock': 0.92,
  'Industrial': 0.95, 'EBM': 0.97,
};

function trackPos(track) {
  const years = S.spiralTracks.map(t => t.year).filter(y => y > 0);
  const minY = Math.min(...years), maxY = Math.max(...years);
  const x = ((track.year || minY) - minY) / (maxY - minY || 1);
  const s = track.styles?.[0];
  let y = STYLE_POS[s] ?? 0.5;
  if (y === undefined) {
    for (const [k, v] of Object.entries(STYLE_POS)) {
      if (s?.toLowerCase().includes(k.toLowerCase())) { y = v; break; }
    }
  }
  return { x, y: y ?? 0.5 };
}

// ── State ────────────────────────────────────────────────────────────────────
const S = {
  collection:     [],
  spiralTracks:   [],
  listTracks:     [],
  dots:           [],   // { x, y, track }
  activePreset:   null,
  anchorTrack:    null,
  selectedStyles: new Set(),
  sortKey:        'year',
  sortDir:        'asc',
  hoveredDot:     null,
  // path
  pathMode:       false,
  pathOrigin:     null,
  pathDest:       null,
  pathStops:      1,
  pathWaypoints:  [],   // intermediate tracks (auto or manually dragged)
  dragWpIdx:      null, // index into pathWaypoints being dragged
  snapDot:        null, // candidate dot during drag
};

// ── DOM ──────────────────────────────────────────────────────────────────────
const canvas     = document.getElementById('compass');
const ctx        = canvas.getContext('2d');
const tooltip    = document.getElementById('tooltip');
const overlay    = document.getElementById('upload-overlay');
const sidePanel  = document.getElementById('side-panel');
const canvasWrap = document.getElementById('canvas-wrap');
const trackList  = document.getElementById('track-list');
const styleChips = document.getElementById('style-chips');
const hintEl     = document.getElementById('hint');
const statsEl    = document.getElementById('stats');

// ── Spiral layout ─────────────────────────────────────────────────────────────
const LOOPS  = 3;
const MIN_R  = 58;

function sizeCanvas() {
  const r = canvasWrap.getBoundingClientRect();
  const s = Math.min(r.width, r.height) - 16;
  canvas.width  = s;
  canvas.height = s;
}

function maxR() { return canvas.width / 2 - 48; }

function buildSpiral() {
  const cx = canvas.width / 2, cy = canvas.height / 2;
  const n  = S.spiralTracks.length;
  if (!n) { S.dots = []; return; }

  S.dots = S.spiralTracks.map((track, i) => {
    const frac  = i / Math.max(n - 1, 1);
    const theta = frac * LOOPS * Math.PI * 2 - Math.PI / 2;
    const r     = MIN_R + frac * (maxR() - MIN_R);
    const seed  = track.id || i;
    const j     = (rng(seed) - 0.5) * 5;

    return {
      x: cx + Math.cos(theta) * (r + j),
      y: cy + Math.sin(theta) * (r + j),
      track,
    };
  });
}

// ── Preset logic ──────────────────────────────────────────────────────────────
function matchesPreset(track, anchor) {
  switch (S.activePreset) {
    case 'synchronicity': {
      if (!anchor || track === anchor) return false;
      const d = Math.abs(track.year - anchor.year);
      return d > 0 && d <= 7;
    }
    case 'space': {
      const t = (track.title || '').toLowerCase();
      return SPACE_WORDS.some(w => t.includes(w));
    }
    case 'year': {
      if (!anchor || track === anchor) return false;
      return Math.abs(track.year - anchor.year) <= 2;
    }
    case 'style': {
      if (!anchor || track === anchor) return false;
      const aSet = new Set(anchor.styles || []);
      return (track.styles || []).some(s => aSet.has(s));
    }
    default: return true;
  }
}

function isHighlighted(track) {
  if (!S.activePreset) return true;
  if (track === S.anchorTrack) return true;
  if (S.activePreset === 'space') return matchesPreset(track, null);
  if (!S.anchorTrack) return true; // no anchor yet → show all
  return matchesPreset(track, S.anchorTrack);
}

// ── Path computation ──────────────────────────────────────────────────────────
function computePath() {
  if (!S.pathOrigin || !S.pathDest) { S.pathWaypoints = []; return; }
  const aPos = trackPos(S.pathOrigin);
  const dPos = trackPos(S.pathDest);
  const used = new Set([S.pathOrigin.id, S.pathDest.id]);
  S.pathWaypoints = [];

  for (let i = 1; i <= S.pathStops; i++) {
    const t  = i / (S.pathStops + 1);
    const tx = aPos.x + t * (dPos.x - aPos.x);
    const ty = aPos.y + t * (dPos.y - aPos.y);
    let best = null, bestD = Infinity;
    S.spiralTracks.forEach(track => {
      if (used.has(track.id)) return;
      const p = trackPos(track);
      const d = (p.x - tx) ** 2 + (p.y - ty) ** 2;
      if (d < bestD) { bestD = d; best = track; }
    });
    if (best) { S.pathWaypoints.push(best); used.add(best.id); }
  }
}

function pathSequence() {
  if (!S.pathOrigin) return [];
  const seq = [S.pathOrigin, ...S.pathWaypoints];
  if (S.pathDest) seq.push(S.pathDest);
  return seq;
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const W = canvas.width, H = canvas.height;
  const cx = W / 2, cy = H / 2;
  ctx.clearRect(0, 0, W, H);
  if (!S.dots.length) return;

  const MR = maxR();
  const n  = S.spiralTracks.length;

  // Spiral guide
  ctx.beginPath();
  for (let i = 0; i <= 500; i++) {
    const frac  = i / 500;
    const theta = frac * LOOPS * Math.PI * 2 - Math.PI / 2;
    const r     = MIN_R + frac * (MR - MIN_R);
    const x = cx + Math.cos(theta) * r;
    const y = cy + Math.sin(theta) * r;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.strokeStyle = 'rgba(200,169,110,0.05)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Year labels at each decade
  const years = S.spiralTracks.map(t => t.year).filter(y => y > 0);
  if (years.length) {
    const minY = Math.min(...years), maxY = Math.max(...years);
    ctx.font = '8px Courier New';
    ctx.fillStyle = 'rgba(200,169,110,0.3)';
    ctx.textAlign = 'center';

    for (let yr = Math.ceil(minY / 10) * 10; yr <= maxY; yr += 10) {
      const idx = S.spiralTracks.findIndex(t => t.year >= yr);
      if (idx < 0) continue;
      const frac  = idx / Math.max(n - 1, 1);
      const theta = frac * LOOPS * Math.PI * 2 - Math.PI / 2;
      const r     = MIN_R + frac * (MR - MIN_R);
      ctx.fillText(yr,
        cx + Math.cos(theta) * (r + 11),
        cy + Math.sin(theta) * (r + 11) + 3
      );
    }
  }

  // Dots — dim first, lit on top
  S.dots.forEach(dot => {
    if (dot === S.hoveredDot || dot.track === S.anchorTrack) return;
    const hue = styleHue(dot.track.styles);
    const lit = isHighlighted(dot.track);
    ctx.beginPath();
    ctx.arc(dot.x, dot.y, 3, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${hue},70%,62%,${lit ? 0.72 : 0.07})`;
    ctx.fill();
  });

  // Hovered dot
  if (S.hoveredDot && S.hoveredDot.track !== S.anchorTrack) {
    const { x, y } = S.hoveredDot;
    const hue = styleHue(S.hoveredDot.track.styles);
    const g = ctx.createRadialGradient(x, y, 0, x, y, 18);
    g.addColorStop(0, `hsla(${hue},75%,65%,0.38)`);
    g.addColorStop(1, `hsla(${hue},75%,65%,0)`);
    ctx.beginPath(); ctx.arc(x, y, 18, 0, Math.PI * 2);
    ctx.fillStyle = g; ctx.fill();
    ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fillStyle = `hsl(${hue},72%,68%)`; ctx.fill();
  }

  // Anchor dot — gold, on top
  if (S.anchorTrack && !S.pathMode) {
    const dot = S.dots.find(d => d.track === S.anchorTrack);
    if (dot) {
      const g = ctx.createRadialGradient(dot.x, dot.y, 0, dot.x, dot.y, 22);
      g.addColorStop(0, 'rgba(200,169,110,0.5)');
      g.addColorStop(1, 'rgba(200,169,110,0)');
      ctx.beginPath(); ctx.arc(dot.x, dot.y, 22, 0, Math.PI * 2);
      ctx.fillStyle = g; ctx.fill();
      ctx.beginPath(); ctx.arc(dot.x, dot.y, 5, 0, Math.PI * 2);
      ctx.fillStyle = '#c8a96e'; ctx.fill();
    }
  }

  // ── Path ──
  if (S.pathMode) {
    const seq = pathSequence();
    const seqDots = seq.map(t => S.dots.find(d => d.track === t)).filter(Boolean);

    // Snap candidate glow
    if (S.snapDot) {
      const g = ctx.createRadialGradient(S.snapDot.x, S.snapDot.y, 0, S.snapDot.x, S.snapDot.y, 16);
      g.addColorStop(0, 'rgba(240,237,232,0.35)'); g.addColorStop(1, 'rgba(240,237,232,0)');
      ctx.beginPath(); ctx.arc(S.snapDot.x, S.snapDot.y, 16, 0, Math.PI * 2);
      ctx.fillStyle = g; ctx.fill();
    }

    // Catmull-Rom spline through path dots
    if (seqDots.length >= 2) {
      ctx.beginPath();
      ctx.moveTo(seqDots[0].x, seqDots[0].y);
      for (let i = 0; i < seqDots.length - 1; i++) {
        const p0 = seqDots[Math.max(i - 1, 0)];
        const p1 = seqDots[i];
        const p2 = seqDots[i + 1];
        const p3 = seqDots[Math.min(i + 2, seqDots.length - 1)];
        const cp1x = p1.x + (p2.x - p0.x) / 6;
        const cp1y = p1.y + (p2.y - p0.y) / 6;
        const cp2x = p2.x - (p3.x - p1.x) / 6;
        const cp2y = p2.y - (p3.y - p1.y) / 6;
        ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, p2.x, p2.y);
      }
      ctx.strokeStyle = 'rgba(240,237,232,0.45)';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([4, 5]);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // Origin dot — gold
    if (S.pathOrigin) {
      const d = S.dots.find(x => x.track === S.pathOrigin);
      if (d) {
        ctx.beginPath(); ctx.arc(d.x, d.y, 6, 0, Math.PI * 2);
        ctx.fillStyle = '#c8a96e'; ctx.fill();
      }
    }

    // Destination dot — white
    if (S.pathDest) {
      const d = S.dots.find(x => x.track === S.pathDest);
      if (d) {
        ctx.beginPath(); ctx.arc(d.x, d.y, 6, 0, Math.PI * 2);
        ctx.fillStyle = '#f0ede8'; ctx.fill();
      }
    }

    // Waypoint dots — draggable, outlined
    S.pathWaypoints.forEach((track, i) => {
      const d = S.dots.find(x => x.track === track);
      if (!d) return;
      const isDragging = S.dragWpIdx === i;
      ctx.beginPath(); ctx.arc(d.x, d.y, isDragging ? 7 : 5, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(240,237,232,0.7)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.beginPath(); ctx.arc(d.x, d.y, isDragging ? 7 : 5, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(240,237,232,0.15)';
      ctx.fill();
    });
  }
}

// ── Filter + sort ─────────────────────────────────────────────────────────────
function applyFilter() {
  let base = [...S.collection];

  if (S.selectedStyles.size) {
    base = base.filter(t =>
      (t.styles || []).some(s => S.selectedStyles.has(s))
    );
  }

  // Spiral: always chronological
  S.spiralTracks = [...base].sort((a, b) => (a.year || 0) - (b.year || 0));

  applySort(false); // rebuild list without re-filtering
  buildSpiral();
  render();
}

function applySort(rebuildSpiral = true) {
  S.listTracks = [...S.spiralTracks].sort((a, b) => {
    let av, bv;
    switch (S.sortKey) {
      case 'year':  av = a.year  || 0;        bv = b.year  || 0;        break;
      case 'style': av = a.styles?.[0] || ''; bv = b.styles?.[0] || ''; break;
      case 'label': av = a.label || '';       bv = b.label || '';       break;
      case 'title': av = a.title || '';       bv = b.title || '';       break;
      default:      av = 0; bv = 0;
    }
    const cmp = typeof av === 'number' ? av - bv : av.localeCompare(bv);
    return S.sortDir === 'asc' ? cmp : -cmp;
  });

  if (rebuildSpiral) { buildSpiral(); render(); }
  renderList();
}

// ── Side panel list ───────────────────────────────────────────────────────────
function renderList() {
  // When preset + anchor active, show only matching tracks in list
  const tracks = (S.activePreset && S.anchorTrack)
    ? S.listTracks.filter(t => t === S.anchorTrack || matchesPreset(t, S.anchorTrack))
    : S.listTracks;

  trackList.innerHTML = tracks.map(track => {
    const hue     = styleHue(track.styles);
    const isAnch  = track === S.anchorTrack;
    return `<div class="ti${isAnch ? ' anchor' : ''}" data-id="${track.id}">
      <div class="ti-dot" style="background:hsl(${hue},70%,62%)"></div>
      <div class="ti-body">
        <div class="ti-title">${track.title}</div>
        <div class="ti-meta">${track.artist}${track.styles?.[0] ? ' · ' + track.styles[0] : ''}</div>
      </div>
      <div class="ti-year">${track.year || '—'}</div>
    </div>`;
  }).join('');

  trackList.querySelectorAll('.ti').forEach(el => {
    el.addEventListener('click', () => {
      const track = S.collection.find(t => t.id === parseInt(el.dataset.id));
      if (track) setAnchor(track);
    });
  });
}

// ── Style chips ───────────────────────────────────────────────────────────────
function buildStyleChips() {
  const counts = {};
  S.collection.forEach(t => (t.styles || []).forEach(s => {
    counts[s] = (counts[s] || 0) + 1;
  }));

  styleChips.innerHTML = Object.entries(counts)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 18)
    .map(([s]) => `<button class="chip" data-s="${s}">${s}</button>`)
    .join('');

  styleChips.querySelectorAll('.chip').forEach(btn => {
    btn.addEventListener('click', () => {
      const s = btn.dataset.s;
      if (S.selectedStyles.has(s)) { S.selectedStyles.delete(s); btn.classList.remove('on'); }
      else                          { S.selectedStyles.add(s);    btn.classList.add('on');    }
      S.anchorTrack = null;
      applyFilter();
    });
  });
}

// ── Anchor ────────────────────────────────────────────────────────────────────
function setAnchor(track) {
  S.anchorTrack = S.anchorTrack === track ? null : track;
  renderList();
  render();
  updateHint();
}

function updateHint() {
  const needsAnchor = ['synchronicity', 'year', 'style'].includes(S.activePreset);
  if (!S.activePreset) {
    hintEl.classList.remove('show');
    return;
  }
  if (S.activePreset === 'space') {
    const n = S.spiralTracks.filter(t => matchesPreset(t, null)).length;
    hintEl.textContent = `${n} space tracks`;
    hintEl.classList.add('show');
    return;
  }
  if (!S.anchorTrack) {
    hintEl.textContent = 'Click a track to set anchor';
    hintEl.classList.add('show');
    return;
  }
  const matches = S.spiralTracks.filter(t =>
    t !== S.anchorTrack && matchesPreset(t, S.anchorTrack)
  );
  const labels = {
    synchronicity: `${matches.length} tracks ±7yr from ${S.anchorTrack.year}`,
    year:          `${matches.length} tracks within ±2yr of ${S.anchorTrack.year}`,
    style:         `${matches.length} tracks sharing ${S.anchorTrack.styles?.[0] || 'style'}`,
  };
  hintEl.textContent = labels[S.activePreset] || '';
  hintEl.classList.add('show');
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function buildStats() {
  const yrs = S.collection.map(t => t.year).filter(y => y > 1920);
  statsEl.innerHTML = `${S.collection.length} releases · ${Math.min(...yrs)}–${Math.max(...yrs)}`;
}

// ── Hover + click ─────────────────────────────────────────────────────────────
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;

  let best = null, bestD = Infinity;
  S.dots.forEach(d => {
    const dist = (d.x - mx) ** 2 + (d.y - my) ** 2;
    if (dist < bestD) { bestD = dist; best = d; }
  });

  const hit = bestD < 400 ? best : null;

  // During waypoint drag, find snap candidate (exclude origin/dest/existing waypoints)
  if (S.dragWpIdx !== null) {
    const excluded = new Set([
      S.pathOrigin?.id, S.pathDest?.id,
      ...S.pathWaypoints.map(t => t.id),
    ]);
    let snapBest = null, snapD = Infinity;
    S.dots.forEach(d => {
      if (excluded.has(d.track.id)) return;
      const dist = (d.x - mx) ** 2 + (d.y - my) ** 2;
      if (dist < snapD) { snapD = dist; snapBest = d; }
    });
    S.snapDot = snapBest;
    render();
    return;
  }

  if (hit !== S.hoveredDot) { S.hoveredDot = hit; render(); }

  if (S.hoveredDot) {
    const t   = S.hoveredDot.track;
    const hue = styleHue(t.styles);
    const cover = tooltip.querySelector('.tt-cover');
    cover.src = t.cover_image || '';
    cover.style.display = t.cover_image ? 'block' : 'none';
    tooltip.querySelector('.tt-artist').textContent = t.artist || '—';
    tooltip.querySelector('.tt-title').textContent  = t.title  || '—';
    tooltip.querySelector('.tt-meta').innerHTML = [
      t.year ? String(t.year) : null,
      t.styles?.length ? `<span class="gdot" style="background:hsl(${hue},70%,62%)"></span>${t.styles[0]}` : null,
      t.label || null,
    ].filter(Boolean).join('<br>');

    let tx = e.clientX + 16, ty = e.clientY - 10;
    if (tx + 210 > window.innerWidth)  tx = e.clientX - 210;
    if (ty + 150 > window.innerHeight) ty = e.clientY - 150;
    tooltip.style.left = `${tx}px`;
    tooltip.style.top  = `${ty}px`;
    tooltip.classList.add('show');
  } else {
    tooltip.classList.remove('show');
  }
});

canvas.addEventListener('mouseleave', () => {
  S.hoveredDot = null;
  S.snapDot    = null;
  S.dragWpIdx  = null;
  tooltip.classList.remove('show');
  render();
});

canvas.addEventListener('mousedown', e => {
  if (!S.pathMode || !S.pathWaypoints.length) return;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  S.pathWaypoints.forEach((track, i) => {
    const d = S.dots.find(x => x.track === track);
    if (!d) return;
    if ((d.x - mx) ** 2 + (d.y - my) ** 2 < 144) S.dragWpIdx = i; // 12px
  });
});

canvas.addEventListener('mouseup', () => {
  if (S.dragWpIdx !== null && S.snapDot) {
    S.pathWaypoints[S.dragWpIdx] = S.snapDot.track;
    S.snapDot   = null;
    S.dragWpIdx = null;
    render();
    updatePathPanel();
  } else {
    S.dragWpIdx = null;
    S.snapDot   = null;
  }
});

canvas.addEventListener('click', e => {
  if (S.pathMode) {
    if (!S.hoveredDot) return;
    if (e.shiftKey) {
      if (S.hoveredDot.track !== S.pathOrigin) {
        S.pathDest = S.hoveredDot.track;
        computePath();
        render();
        updatePathPanel();
      }
    } else {
      S.pathOrigin    = S.hoveredDot.track;
      S.pathDest      = null;
      S.pathWaypoints = [];
      render();
      updatePathPanel();
    }
  } else {
    if (S.hoveredDot) setAnchor(S.hoveredDot.track);
  }
});

// ── Controls ──────────────────────────────────────────────────────────────────
document.getElementById('menu-btn').addEventListener('click', () => {
  const open = sidePanel.classList.toggle('open');
  document.getElementById('menu-btn').classList.toggle('open', open);
  setTimeout(() => { sizeCanvas(); buildSpiral(); render(); }, 300);
});

document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const p = btn.dataset.preset;
    const toggling = S.activePreset === p;
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    S.activePreset = toggling ? null : p;
    S.anchorTrack  = null;
    if (!toggling) btn.classList.add('active');
    renderList();
    render();
    updateHint();
  });
});

document.querySelectorAll('.sort-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    S.sortKey = btn.dataset.key;
    applySort();
  });
});

document.getElementById('dir-btn').addEventListener('click', () => {
  S.sortDir = S.sortDir === 'asc' ? 'desc' : 'asc';
  document.getElementById('dir-btn').textContent = S.sortDir === 'asc' ? '↑' : '↓';
  applySort();
});

// ── Path controls ─────────────────────────────────────────────────────────────
const pathPanel  = document.getElementById('path-panel');
const pathSlider = document.getElementById('path-slider');
const pathCount  = document.getElementById('path-count');

function updatePathPanel() {
  const active = S.pathMode && S.pathOrigin && S.pathDest;
  pathPanel.classList.toggle('show', active);
  if (active) {
    const n = S.pathStops;
    pathCount.textContent = `${n} stop${n > 1 ? 's' : ''}`;
  }
  // Hint
  if (S.pathMode) {
    if (!S.pathOrigin) {
      hintEl.textContent = 'Click origin track';
      hintEl.classList.add('show');
    } else if (!S.pathDest) {
      hintEl.textContent = 'Shift+click destination';
      hintEl.classList.add('show');
    } else {
      hintEl.classList.remove('show');
    }
  }
}

document.getElementById('path-btn').addEventListener('click', () => {
  S.pathMode      = !S.pathMode;
  S.pathOrigin    = null;
  S.pathDest      = null;
  S.pathWaypoints = [];
  S.dragWpIdx     = null;
  S.snapDot       = null;
  document.getElementById('path-btn').classList.toggle('active', S.pathMode);
  pathPanel.classList.remove('show');
  if (!S.pathMode) hintEl.classList.remove('show');
  render();
  updatePathPanel();
});

pathSlider.addEventListener('input', () => {
  S.pathStops = parseInt(pathSlider.value);
  computePath();
  render();
  updatePathPanel();
});

document.getElementById('path-clear').addEventListener('click', () => {
  S.pathOrigin    = null;
  S.pathDest      = null;
  S.pathWaypoints = [];
  pathPanel.classList.remove('show');
  render();
  updatePathPanel();
});

window.addEventListener('resize', () => {
  if (!S.collection.length) return;
  sizeCanvas(); buildSpiral(); render();
});

// ── Init ──────────────────────────────────────────────────────────────────────
function init(data) {
  S.collection = data;
  applyFilter();
  buildStyleChips();
  buildStats();
}

(async () => {
  try {
    const res = await fetch('data/collection.json');
    if (!res.ok) throw new Error();
    const data = await res.json();
    overlay.style.display = 'none';
    init(data);
  } catch {
    overlay.style.display = 'flex';
  }
})();

document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      overlay.style.display = 'none';
      init(JSON.parse(ev.target.result));
    } catch { alert('Could not parse JSON.'); }
  };
  reader.readAsText(file);
});
</script>

</body>
</html>
