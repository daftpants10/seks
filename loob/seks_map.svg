<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" font-family="'Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="g2" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="#fdfdfe"/>

  <!-- branch lines radiating from the knot -->
  <line x1="540" y1="488" x2="540" y2="280" stroke="url(#g1)" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="492" y1="585" x2="320" y2="760" stroke="url(#g2)" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="588" y1="585" x2="760" y2="760" stroke="url(#g3)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- node dots -->
  <circle cx="540" cy="280" r="8" fill="#8b5cf6"/>
  <circle cx="320" cy="760" r="8" fill="#8b5cf6"/>
  <circle cx="760" cy="760" r="8" fill="#8b5cf6"/>
  <circle cx="540" cy="488" r="5.5" fill="#22d3ee"/>
  <circle cx="492" cy="585" r="5.5" fill="#22d3ee"/>
  <circle cx="588" cy="585" r="5.5" fill="#22d3ee"/>

  <!-- loob knot — interlocking double loop, the collective mark -->
  <g transform="translate(540,540) scale(1.0)" fill="none" stroke="#0a0a0a" stroke-width="11" stroke-linecap="round" stroke-linejoin="round">
    <!-- left loop with descending tail (the 'l' / record) -->
    <path d="M -18 22
             C -52 22 -52 -28 -18 -28
             C 6 -28 10 6 -2 26
             C -10 40 -30 40 -34 26"/>
    <!-- right loop, interlocked (the 'b' / second record) -->
    <path d="M 18 -22
             C 52 -22 52 28 18 28
             C -6 28 -10 -6 2 -26
             C 10 -40 30 -40 34 -26"/>
  </g>

  <!-- labels -->
  <text x="540" y="232" text-anchor="middle" font-size="44" font-weight="300" fill="#8b5cf6">music</text>
  <text x="540" y="258" text-anchor="middle" font-size="17" font-weight="300" fill="#9aa5b1">sekstapes · seksY radio</text>

  <text x="320" y="822" text-anchor="middle" font-size="44" font-weight="300" fill="#3b9fd4">education</text>
  <text x="320" y="848" text-anchor="middle" font-size="17" font-weight="300" fill="#9aa5b1">seksEDS · studio · production</text>

  <text x="760" y="822" text-anchor="middle" font-size="44" font-weight="300" fill="#3b9fd4">community</text>
  <text x="760" y="848" text-anchor="middle" font-size="17" font-weight="300" fill="#9aa5b1">parties · the dancefloor</text>

  <!-- core wordmark -->
  <text x="540" y="640" text-anchor="middle" font-size="20" font-weight="600" letter-spacing="0.08em" fill="#0a0a0a">loob</text>
  <text x="540" y="666" text-anchor="middle" font-size="13" font-weight="300" letter-spacing="0.35em" fill="#b0b8c0">REDUCING FRICTION</text>
  <text x="540" y="700" text-anchor="middle" font-size="13" font-weight="300" letter-spacing="0.2em" fill="#9aa5b1">⦿-⦿ the stick · find the others</text>
</svg>
