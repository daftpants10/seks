<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research Updates</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f9f9f7;
      --text: #111;
      --muted: #777;
      --border: #ddd;
      --accent: #111;
      --tag-bg: #eee;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 16px;
      line-height: 1.7;
      max-width: 720px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    header {
      border-bottom: 2px solid var(--text);
      padding-bottom: 24px;
      margin-bottom: 48px;
    }

    .header-symbol {
      font-family: monospace;
      font-size: 22px;
      letter-spacing: 4px;
      color: var(--text);
      display: block;
      margin-bottom: 8px;
    }

    header h1 {
      font-size: 13px;
      font-weight: normal;
      font-family: 'Courier New', monospace;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--muted);
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 36px;
    }

    .filter-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Courier New', monospace;
      font-size: 11px;
      padding: 4px 12px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      transition: all 0.15s;
    }

    .filter-btn:hover,
    .filter-btn.active {
      border-color: var(--text);
      color: var(--text);
      background: var(--text);
      color: var(--bg);
    }

    .feed { }

    .update {
      padding: 32px 0;
      border-bottom: 1px solid var(--border);
    }

    .update:last-child { border-bottom: none; }

    .update-date {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 10px;
    }

    .update-title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 16px;
      line-height: 1.3;
    }

    .update-body {
      color: #333;
      font-size: 16px;
    }

    .update-body p {
      margin-bottom: 14px;
    }

    .update-body p:last-child { margin-bottom: 0; }

    .update-images {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 20px;
    }

    .update-images img {
      max-width: 100%;
      max-height: 400px;
      object-fit: contain;
      border: 1px solid var(--border);
    }

    .update-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 18px;
    }

    .tag {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      background: var(--tag-bg);
      color: var(--muted);
      padding: 2px 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .empty-state {
      padding: 60px 0;
      text-align: center;
      color: var(--muted);
      font-family: 'Courier New', monospace;
      font-size: 13px;
      letter-spacing: 0.08em;
    }

    .empty-state .symbol {
      font-size: 24px;
      letter-spacing: 6px;
      display: block;
      margin-bottom: 16px;
    }

    @media (max-width: 500px) {
      body { padding: 24px 16px 60px; }
      .update-title { font-size: 18px; }
    }
  </style>
</head>
<body>
  <header>
    <span class="header-symbol">⦿-⦿</span>
    <h1>Research Updates</h1>
  </header>

  <div class="filters" id="filters"></div>

  <div class="feed" id="feed">
    <div class="empty-state">
      <span class="symbol">⦿-⦿</span>
      Loading...
    </div>
  </div>

  <script>
    let allUpdates = [];
    let activeTag = null;

    async function init() {
      try {
        const res = await fetch('./updates.json');
        allUpdates = await res.json();
      } catch (e) {
        allUpdates = [];
      }
      renderFilters();
      renderFeed();
    }

    function renderFilters() {
      const filtersEl = document.getElementById('filters');
      // Collect all tags
      const tagSet = new Set();
      allUpdates.forEach(u => (u.tags || []).forEach(t => tagSet.add(t)));

      if (tagSet.size === 0) {
        filtersEl.style.display = 'none';
        return;
      }

      const allBtn = document.createElement('button');
      allBtn.className = 'filter-btn active';
      allBtn.textContent = 'All';
      allBtn.onclick = () => { activeTag = null; setActiveFilter(allBtn); renderFeed(); };
      filtersEl.appendChild(allBtn);

      tagSet.forEach(tag => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.textContent = tag;
        btn.onclick = () => { activeTag = tag; setActiveFilter(btn); renderFeed(); };
        filtersEl.appendChild(btn);
      });
    }

    function setActiveFilter(activeBtn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      activeBtn.classList.add('active');
    }

    function renderFeed() {
      const feedEl = document.getElementById('feed');
      const updates = activeTag
        ? allUpdates.filter(u => (u.tags || []).includes(activeTag))
        : allUpdates;

      if (updates.length === 0) {
        feedEl.innerHTML = `
          <div class="empty-state">
            <span class="symbol">⦿-⦿</span>
            No updates yet.
          </div>`;
        return;
      }

      feedEl.innerHTML = '';
      updates.forEach(u => {
        const article = document.createElement('article');
        article.className = 'update';

        const date = formatDate(u.date);
        const bodyHtml = renderBody(u.body || '');
        const tagsHtml = (u.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join('');
        const imagesHtml = renderImages(u.images || []);

        article.innerHTML = `
          <div class="update-date">${date}</div>
          <h2 class="update-title">${esc(u.title)}</h2>
          <div class="update-body">${bodyHtml}</div>
          ${imagesHtml}
          ${tagsHtml ? `<div class="update-tags">${tagsHtml}</div>` : ''}
        `;

        feedEl.appendChild(article);
      });
    }

    function renderBody(text) {
      // Simple: split on double newlines → paragraphs
      return text
        .split(/\n\n+/)
        .map(p => p.trim())
        .filter(Boolean)
        .map(p => `<p>${esc(p).replace(/\n/g, '<br>')}</p>`)
        .join('');
    }

    function renderImages(images) {
      if (!images || images.length === 0) return '';
      const imgs = images
        .map(src => `<img src="${esc(src)}" alt="" loading="lazy">`)
        .join('');
      return `<div class="update-images">${imgs}</div>`;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      try {
        const d = new Date(dateStr);
        return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
      } catch (e) {
        return dateStr;
      }
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    init();
  </script>
</body>
</html>
